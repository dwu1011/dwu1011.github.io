
<html>
    <head>
        <style type ='text/css'>
            div.Container{
                display: grid;
                grid-template-areas:
                "Header Header Header Header Header"
                "Menuu Body Body Body Body";
                grid-template-rows: 1fr 4fr;
                grid-gap:10px;
                height: 100%;
            }
            div.Header{
                grid-area: Header;
                background-color: rgb(2, 87, 2);
                display:flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                color:white;
            }
            div.Menu{
                grid-area: Menuu;
                background-color:white;
                display:flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;

            }
            div.Body{
                grid-area: Body;
                background-color:white;
                display:flex;
                flex-direction: column;
            }
            a.Links{
                background-color:red;
                height: 20px;
                width:40%;
                display:flex;
                align-items:center;
                padding:2ex;
                border-style:solid;
                border-color:black;
                margin-top: 1ex;
            }
            .Title{
                font-size:10ex;
                text-align: center;
                width:70%;
                border-bottom:1px solid;
                border-bottom-color:white;
            }
            .Name{
                font-size: 4ex;
            }
        </style>
    </head>
    <body>
        <div class = 'Container'>
            <div class = 'Header'>
                <div class='Title'>CTY Portfolio </div>
                <div class='Name'> David Wu</div>
            </div>
           <div class='Menu'>
               <h3>Project Links</h3>
               <a href="PONG" class='Links'> PONG </a>
               <a href="tictactoe" class='Links'> Tic-Tac-Toe</a>
               <a href="Caclulator" class ='Links'> Calculator </a>
               <h3>Favorite Links</h3>
               <a href="http://www.google.com" class='Links'>Google</a> 
               <a href="http://www.gmail.com" class='Links'>Gmail</a>
               <a href="http://www.dafk.net/what" class='Links'>Troll</a>
           </div>
           <div class='Body Port'>
              Welcome to my Portfolio! This is the work that I did over at summer camp! Enjoy!
           </div>
        </div>

    </body>
</html>
