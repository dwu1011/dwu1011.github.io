<!DOCTYPE html>
<html>
    <head>
        <title>Sorting</title>
        <script>
            var inputArray = [];
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            function getRndInteger(min, max) {
                return Math.floor(Math.random() * (max - min) ) + min;
            }
            function random(){
                inputArray.splice(0,inputArray.length);
                for(var i = 0; i< 14; i++){
                    inputArray.push(getRndInteger(10,400));
                }
                draw();
            }
            function draw(){
                var canvas = document.getElementById("myCanvas");
                var ctx = canvas.getContext("2d");

                var width = 40;
                var x = 5;

                ctx.fillStyle = '#008080';

                for (var i =0; i < inputArray.length; i++){

                    var h = inputArray[i];
                    ctx.fillRect(x,canvas.height-h,width,h);
                    x += width + 10;
                }

            }

            function reset(){
                var canvas = document.getElementById('myCanvas');
                var ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }

            async function sort(){
                let len = inputArray.length;
                let swapped;
                do {
                    swapped = false;
                    for(let i =0; i< len; i++){
                        if(inputArray[i] > inputArray[i+1]){
                            let tmp = inputArray[i];
                            inputArray[i] = inputArray[i+1];
                            inputArray[i+1] = tmp;
                            swapped=true;
                            reset();
                            draw();
                            console.log("sleeping for a second");
                            await sleep(500);
                        }
                    }
                }while(swapped);
            }
        </script>
    </head>
    <body alight = "center">
        <input type="button" value = "random" name = "randomize" onclick="random()">
        <input type="button" value = "sort" name = "sort" onclick="sort()">
        <input type="button" value = "clear" name = "clear" onclick = "reset()"><br> <br>


        <canvas id="myCanvas" height="400" width="700" style="border:1px solid #c3c3c3;"></canvas>
        
    </body>
</html>
